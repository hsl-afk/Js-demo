<!DOCTYPE html>
<html>
<head>
    <title>Simple Form</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .container{
            display: flex;
            gap: 30px;
        }

        .form-box{
            width: 300px;
            border: 1px solid #ccc;
            padding: 15px;
        }

        .form-group{
            margin-bottom: 12px;
        }

        label{
            display: block;
            margin-bottom: 5px;
        }

        input[type="text"],
        input[type="email"],
        input[type="number"],
        select{
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }

        button{
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        table{
            border-collapse: collapse;
            width: 100%;
        }

        table, th, td{
            border: 1px solid #ddd;
        }

        th{
            background: #343a40;
            color: white;
            padding: 10px;
        }

        td{
            padding: 8px;
            text-align: center;
        }
    </style>
</head>
<body>

<h2>User Registration Form</h2>

<div class="container">

    <!-- Form -->
    <div class="form-box">

        <div class="form-group">
            <label>Name</label>
            <input type="text" id="name">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email">
        </div>

        <div class="form-group">
            <label>Gender</label>
            <input type="radio" name="gender" value="Male"> Male
            <input type="radio" name="gender" value="Female"> Female
        </div>

        <div class="form-group">
            <label>Hobbies</label>
            <input type="checkbox" value="Reading" class="hobby"> Reading
            <input type="checkbox" value="Travelling" class="hobby"> Travelling
            <input type="checkbox" value="Sports" class="hobby"> Sports
        </div>

        <div class="form-group">
            <label>State</label>
            <select id="state">
                <option value="">Select State</option>
                <option>Gujarat</option>
                <option>Maharashtra</option>
                <option>Rajasthan</option>
            </select>
        </div>

        <div class="form-group">
            <label>City</label>
            <select id="city">
                <option value="">Select City</option>
                <option>Surat</option>
                <option>Ahmedabad</option>
            </select>
        </div>

        <button onclick="saveData()">Save</button>
    </div>

    <!-- Table -->
    <div style="flex:1;">
        <table id="userTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Gender</th>
                    <th>Hobbies</th>
                    <th>Age</th>
                    <th>State</th>
                    <th>City</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</body>
</html>

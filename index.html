<!DOCTYPE html>
<html>
<head>
    <title>Simple Form</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        table{
            border-collapse: collapse;
            width: 350px;
        }

        td{
            border: 1px solid #ddd;
            padding: 10px;
        }

        input[type="text"],
        input[type="email"],
        select{
            width: 100%;
            padding: 6px;
            box-sizing: border-box;
        }

        .btn{
            width: 100%;
            padding: 8px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<table>
    <tr>
        <td>Name:</td>
        <td><input type="text"></td>
    </tr>

    <tr>
        <td>Email</td>
        <td><input type="email"></td>
    </tr>

    <tr>
        <td>Gender</td>
        <td>
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
        </td>
    </tr>

    <tr>
        <td>Hobby</td>
        <td>
            <input type="checkbox"> Reading
            <input type="checkbox"> Travelling
            <input type="checkbox"> Sports
        </td>
    </tr>

    <tr>
        <td>Country</td>
        <td>
            <select>
                <option>Select</option>
                <option>India</option>
                <option>USA</option>
            </select>
        </td>
    </tr>

    <tr>
        <td>State</td>
        <td>
            <select>
                <option>Select</option>
                <option>Gujarat</option>
                <option>Maharashtra</option>
            </select>
        </td>
    </tr>

    <tr>
        <td>City</td>
        <td>
            <select>
                <option>Select</option>
                <option>Surat</option>
                <option>Ahmedabad</option>
                <option>Navsari</option>
            </select>
        </td>
    </tr>

    <tr>
        <td>Action</td>
        <td>
            <button class="btn">Save</button>
        </td>
    </tr>
</table>

</body>
</html>
